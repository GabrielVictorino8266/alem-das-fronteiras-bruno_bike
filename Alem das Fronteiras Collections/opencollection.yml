opencollection: 1.0.0

info:
  name: Alem das Fronteiras Collections
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{access}}"
  variables:
    - name: email
      value: ""
    - name: senha
      value: ""
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: access
        scope: runtime
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: refresh
        scope: runtime
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
